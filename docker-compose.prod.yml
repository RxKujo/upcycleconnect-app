version: '3.9'

# ============================================================
# UpcycleConnect — Stack de production
#
# Prérequis : copier example.env.prod → .env.prod et remplir
#
# Démarrage : docker compose -f docker-compose.prod.yml \
#               --env-file .env.prod up -d --build
#
# Services   Ports (exposés à l'extérieur)
# ---------  ------
# MySQL      interne uniquement
# PHPMyAdmin 8081
# Go API     8888
# Nginx      80
# ----------------------------------------------------------
# PHP-FPM (web) communique avec Nginx sur le réseau interne
# ============================================================

services:

  # ----------------------------------------------------------
  # Base de données MySQL
  # ----------------------------------------------------------
  db:
    image: mysql:8.0
    container_name: uc_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: upcycleconnect
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "${DB_USERNAME}", "-p${DB_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - uc_network
    # Pas de port exposé à l'extérieur en prod (sécurité)

  # ----------------------------------------------------------
  # PHPMyAdmin (désactivez ce service si non nécessaire en prod)
  # ----------------------------------------------------------
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: uc_phpmyadmin
    restart: always
    environment:
      PMA_HOST: db
      PMA_USER: ${DB_USERNAME}
      PMA_PASSWORD: ${DB_PASSWORD}
    ports:
      - "8081:80"
    depends_on:
      - db
    networks:
      - uc_network

  # ----------------------------------------------------------
  # Go API — binaire compilé, image <15 MB
  # ----------------------------------------------------------
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: uc_api
    restart: always
    environment:
      DB_HOST: db
      DB_PORT: "3306"
      DB_USER: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: upcycleconnect
      JWT_SECRET: ${JWT_SECRET}
      API_PORT: "8888"
    ports:
      - "8888:8888"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - uc_network

  # ----------------------------------------------------------
  # Laravel — PHP-FPM (image multi-stage avec assets compilés)
  # Ne communique pas directement avec l'extérieur, uniquement
  # via Nginx sur le réseau interne (port 9000).
  # ----------------------------------------------------------
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      target: php-stage
    container_name: uc_web
    restart: always
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      APP_KEY: ${APP_KEY}
      APP_URL: ${APP_URL}
      DB_HOST: db
      DB_PORT: "3306"
      DB_DATABASE: upcycleconnect
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      SESSION_DRIVER: database
      QUEUE_CONNECTION: database
      CACHE_STORE: database
      API_URL: "http://api:8888"
    volumes:
      - laravel_storage:/var/www/html/storage/app
      - laravel_logs:/var/www/html/storage/logs
    depends_on:
      db:
        condition: service_healthy
      api:
        condition: service_started
    networks:
      - uc_network

  # ----------------------------------------------------------
  # Nginx — reverse proxy + fichiers statiques
  # Sert les assets compilés (Vite build) et proxyfie le PHP
  # ----------------------------------------------------------
  nginx:
    build:
      context: ./web
      dockerfile: Dockerfile
      target: nginx-stage
    container_name: uc_nginx
    restart: always
    ports:
      - "80:80"
    depends_on:
      - web
    networks:
      - uc_network

volumes:
  mysql_data:
  laravel_storage:
  laravel_logs:

networks:
  uc_network:
    driver: bridge
