version: '3.9'

services:

  db:
    image: mysql:8.0
    container_name: uc_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "${DB_USERNAME}", "-p${DB_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - uc_network

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: uc_phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: db
      PMA_ARBITRARY: 1
      #PMA_USER: ${DB_USERNAME}
      #PMA_PASSWORD: ${DB_PASSWORD}
    ports:
      - "8081:80"
    depends_on:
      - db
    networks:
      - uc_network

  api:
    build:
      context: ./api
      dockerfile: Dockerfile.dev
    container_name: uc_api_dev
    restart: unless-stopped
    volumes:
      - ./api:/app
      - go_pkg_cache:/root/go/pkg/mod
      - go_build_cache:/root/.cache/go
    environment:
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_USER: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_DATABASE}
      JWT_SECRET: ${JWT_SECRET}
      API_PORT: "8888"
      RECAPTCHA_SECRET_KEY: ${RECAPTCHA_SECRET_KEY}
    ports:
      - "8888:8888"
    depends_on:
      db:
        condition: service_started
    networks:
      - uc_network

  web:
    build:
      context: ./web
      dockerfile: Dockerfile.dev
    container_name: uc_web_dev
    restart: unless-stopped
    volumes:
      - ./web:/var/www/html
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: "http://localhost:8000"
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_DATABASE: ${DB_DATABASE}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      SESSION_DRIVER: database
      QUEUE_CONNECTION: database
      CACHE_STORE: database
      API_URL: "http://api:8888"
      RECAPTCHA_SITE_KEY: ${RECAPTCHA_SITE_KEY}
      VITE_DEV_SERVER_URL: "http://localhost:5173"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_started
      api:
        condition: service_started
    networks:
      - uc_network
  
  vite:
    image: node:20-alpine
    container_name: uc_vite_dev
    working_dir: /app
    volumes:
      - ./web:/app
    command: >
      sh -c "npm install --frozen-lockfile && npm run dev -- --host"
    ports:
      - "5173:5173"
    networks:
      - uc_network

volumes:
  mysql_data:
  go_pkg_cache:
  go_build_cache:

networks:
  uc_network:
    name: uc_network
    driver: bridge
